services:
  postgres:
    image: postgres:18-alpine
    container_name: orchestrator_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-orchestrator_db}
      POSTGRES_USER: ${DB_USER:-orchestrator_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orchestrator_password}
      TZ: "America/Argentina/Mendoza"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge