<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="bg-slate-800 text-white p-6 rounded-lg shadow-md mb-6">
  <div class="flex justify-between items-center">
    <div>
      <h2 class="text-xl font-bold mb-1">Session Control Panel</h2>
      <p class="text-slate-400 text-sm">
        @if (stateSync.sessionState(); as session) {
          Current Status: <span class="font-mono px-2 py-1 bg-slate-700 rounded">{{ session.status }}</span>
        } @else {
          No active session detected.
        }
      </p>
    </div>

    @if (stateSync.sessionState(); as session) {
      <div class="flex gap-3">
        <!-- ACTIVE -->
        <p-button 
          label="START SESSION" 
          icon="pi pi-play" 
          severity="success" 
          [disabled]="session.status === 'ACTIVE' || session.status === 'CLOSED'"
          (onClick)="changeStatus('ACTIVE', $event)">
        </p-button>

        <!-- PAUSE -->
        <p-button 
          label="PAUSE SESSION" 
          icon="pi pi-pause" 
          severity="warn" 
          [disabled]="session.status !== 'ACTIVE'"
          (onClick)="changeStatus('PAUSED', $event)">
        </p-button>

        <!-- CLOSE -->
        <p-button 
          label="CLOSE SESSION" 
          icon="pi pi-stop" 
          severity="danger" 
          [disabled]="session.status === 'CLOSED' || session.status === 'PENDING'"
          (onClick)="changeStatus('CLOSED', $event)">
        </p-button>
      </div>
    }
  </div>
</div>
