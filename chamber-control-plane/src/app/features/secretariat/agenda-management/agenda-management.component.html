<p-toast></p-toast>

<div class="mb-4 flex justify-between items-end">
  <div>
    <h2 class="text-2xl font-bold mb-2">Agenda Management</h2>
    <p class="text-slate-600">Create and modify legislative subjects for the chamber floor.</p>
  </div>
  <p-button icon="pi pi-plus" label="New Subject" (onClick)="openCreateDialog()"></p-button>
</div>

<!-- Data Table -->
<p-table #dt [value]="agendaItems" [loading]="isLoading" [globalFilterFields]="['title', 'file_number']" styleClass="p-datatable-striped border border-slate-200">
  <ng-template pTemplate="caption">
    <div class="flex">
      <span class="p-input-icon-left ml-auto">
        <i class="pi pi-search"></i>
        <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Search keyword" />
      </span>
    </div>
  </ng-template>
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 150px">File Number</th>
      <th style="width: 120px">Category</th>
      <th>Title</th>
      <th style="width: 150px">Status</th>
      <th style="width: 180px; text-align: center;">Actions</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td class="font-mono text-sm">{{ item.file_number }}</td>
      <td>
        <span class="px-2 py-1 bg-slate-100 rounded text-sm font-semibold">{{ item.category }}</span>
      </td>
      <td class="font-semibold">{{ item.title }}</td>
      <td>{{ item.status }}</td>
      <td style="text-align: center;">
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary" (onClick)="openEditDialog(item)" title="Edit"></p-button>
        <p-button icon="pi pi-megaphone" [rounded]="true" [text]="true" severity="info" (onClick)="sendToFloor(item)" title="Send to Floor" class="ml-2" [disabled]="item.status === 'DEBATE' || item.status === 'APPROVED_IN_GENERAL' || item.status === 'SANCTIONED'"></p-button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="5" class="text-center py-8 text-slate-500">No agenda items found.</td>
    </tr>
  </ng-template>
</p-table>

<!-- Create / Edit Dialog -->
<p-dialog [(visible)]="showDialog" [header]="isEditing ? 'Edit Subject' : 'New Subject'" [modal]="true" [style]="{width: '50vw'}">
  <form [formGroup]="agendaForm" (ngSubmit)="saveItem()" class="flex flex-col gap-4 mt-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="field">
        <label for="category" class="block mb-2 font-semibold text-slate-700">Category</label>
        <p-select id="category" formControlName="category" [options]="categoryOptions" optionLabel="label" optionValue="value" styleClass="w-full" appendTo="body"></p-select>
      </div>
      <div class="field">
        <label for="file_number" class="block mb-2 font-semibold text-slate-700">File Number</label>
        <input id="file_number" type="text" pInputText formControlName="file_number" class="w-full" placeholder="e.g., EXP-2026-001" />
      </div>
    </div>

    <div class="field">
      <label for="title" class="block mb-2 font-semibold text-slate-700">Title</label>
      <input id="title" type="text" pInputText formControlName="title" class="w-full" />
    </div>

    <div class="field">
      <label for="summary" class="block mb-2 font-semibold text-slate-700">Summary (Optional)</label>
      <textarea id="summary" pTextarea rows="4" formControlName="summary" class="w-full"></textarea>
    </div>

    <div class="flex justify-end gap-2 mt-4">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="showDialog = false"></p-button>
      <p-button label="Save" icon="pi pi-check" type="submit" [disabled]="agendaForm.invalid"></p-button>
    </div>
  </form>
</p-dialog>
