<p-toast></p-toast>

<div class="mb-4 flex justify-between items-end">
  <div>
    <h2 class="text-2xl font-bold mb-2">Gestión de Agenda</h2>
    <p class="text-slate-600">Cree y modifique temas legislativos para el recinto.</p>
  </div>
  <p-button icon="pi pi-plus" label="Nuevo Tema" (onClick)="openCreateDialog()"></p-button>
</div>

<!-- Data Table -->
<p-table #dt [value]="agendaItems" [loading]="isLoading" [globalFilterFields]="['title', 'file_number']" styleClass="p-datatable-striped border border-slate-200">
  <ng-template pTemplate="caption">
    <div class="flex">
      <span class="p-input-icon-left ml-auto">
        <i class="pi pi-search"></i>
        <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar palabra clave" />
      </span>
    </div>
  </ng-template>
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 150px">Nro de Expediente</th>
      <th style="width: 120px">Categoría</th>
      <th>Título</th>
      <th style="width: 150px">Estado</th>
      <th style="width: 180px; text-align: center;">Acciones</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td class="font-mono text-sm">{{ item.file_number }}</td>
      <td>
        <span class="px-2 py-1 bg-slate-100 rounded text-sm font-semibold">{{ item.category }}</span>
      </td>
      <td class="font-semibold">{{ item.title }}</td>
      <td>{{ item.status }}</td>
      <td style="text-align: center;">
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary" (onClick)="openEditDialog(item)" title="Editar"></p-button>
        <p-button icon="pi pi-megaphone" [rounded]="true" [text]="true" severity="info" (onClick)="sendToFloor(item)" title="Enviar a Recinto" class="ml-2" [disabled]="item.status === 'DEBATE' || item.status === 'APPROVED_IN_GENERAL' || item.status === 'SANCTIONED'"></p-button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="5" class="text-center py-8 text-slate-500">No se encontraron temas de agenda.</td>
    </tr>
  </ng-template>
</p-table>

<!-- Create / Edit Dialog -->
<p-dialog [(visible)]="showDialog" [header]="isEditing ? 'Editar Tema' : 'Nuevo Tema'" [modal]="true" [style]="{width: '50vw'}">
  <form [formGroup]="agendaForm" (ngSubmit)="saveItem()" class="flex flex-col gap-4 mt-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="field">
        <label for="category" class="block mb-2 font-semibold text-slate-700">Categoría</label>
        <p-select id="category" formControlName="category" [options]="categoryOptions" optionLabel="label" optionValue="value" styleClass="w-full" appendTo="body"></p-select>
      </div>
      <div class="field">
        <label for="file_number" class="block mb-2 font-semibold text-slate-700">Nro de Expediente</label>
        <input id="file_number" type="text" pInputText formControlName="file_number" class="w-full" placeholder="Ej., EXP-2026-001" />
      </div>
    </div>

    <div class="field">
      <label for="title" class="block mb-2 font-semibold text-slate-700">Título</label>
      <input id="title" type="text" pInputText formControlName="title" class="w-full" />
    </div>

    <div class="field">
      <label for="summary" class="block mb-2 font-semibold text-slate-700">Resumen (Opcional)</label>
      <textarea id="summary" pTextarea rows="4" formControlName="summary" class="w-full"></textarea>
    </div>

    <div class="flex justify-end gap-2 mt-4">
      <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="showDialog = false"></p-button>
      <p-button label="Guardar" icon="pi pi-check" type="submit" [disabled]="agendaForm.invalid"></p-button>
    </div>
  </form>
</p-dialog>
